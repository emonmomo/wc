<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩转世界杯，决战到巅峰！</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #0a1f3d, #1e3a5f); color: #fff; margin:0; padding:15px 0; min-height:100vh; }
        .container { max-width: 1100px; margin:0 auto; background:rgba(255,255,255,0.08); border-radius:20px; overflow:hidden; box-shadow:0 15px 40px rgba(0,0,0,0.6); }
        h1 { margin:0; padding:0; background:rgba(0,0,0,0.5); }
        .header-inner { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; gap:10px; }
        .header-trophy { font-size:1.8em; flex-shrink:0; line-height:1; }
        .header-titles { display:flex; flex-direction:column; align-items:center; gap:1px; flex:1; min-width:0; }
        .header-line1 { color:#ffd700; font-size:clamp(0.95em,3.2vw,1.25em); font-weight:900; letter-spacing:1px; line-height:1.25; white-space:nowrap; }
        .header-line2 { color:#ffc; font-size:clamp(0.95em,3.2vw,1.25em); font-weight:900; letter-spacing:1px; line-height:1.25; white-space:nowrap; }
        .header-bird { width:52px; height:52px; object-fit:contain; flex-shrink:0; }
        .progress { text-align:center; font-size:18px; padding:12px; background:rgba(0,0,0,0.4); font-weight:bold; }
        .group { background:rgba(255,255,255,0.1); margin:12px 0; padding:14px; border-radius:16px; }
        .group h3 { color:#ffd700; font-size:1.15em; margin:0 0 8px 0; }
        .team { display:flex; align-items:center; padding:10px 14px; background:rgba(0,0,0,0.35); border-radius:10px; margin:6px 0; cursor:pointer; transition:background 0.2s, border-color 0.2s; user-select:none; border:1px solid transparent; }
        .team:hover { background:rgba(255,255,255,0.08); }
        .team.selected-1 { background:rgba(200,16,46,0.6); border-color:rgba(220,40,60,0.9); color:#fff; }
        .team.selected-2 { background:rgba(200,16,46,0.28); border-color:rgba(200,16,46,0.55); color:#fff; }
        .team.selected-3 { background:rgba(200,16,46,0.12); border-color:rgba(200,16,46,0.3); color:#ffcccc; }
        .team-flag { width:34px; height:23px; margin-right:11px; border-radius:3px; overflow:hidden; flex-shrink:0; object-fit:cover; }
        .team-name { flex:1; font-size:15px; font-weight:600; }
        .position { font-size:12px; font-weight:700; width:36px; text-align:center; flex-shrink:0; color:rgba(255,255,255,0.6); }
        .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; padding:16px; }
        .third-item { display:flex; align-items:center; padding:10px 14px; background:rgba(0,0,0,0.35); border-radius:10px; margin:5px 0; cursor:pointer; transition:all 0.2s; user-select:none; border:1px solid transparent; }
        .third-item:hover { background:rgba(255,215,0,0.12); }
        .third-item.sel { background:rgba(255,215,0,0.18); border-color:#ffd700; }
        .grp-badge { background:#ffd700; color:#000; border-radius:4px; padding:1px 6px; font-weight:900; font-size:13px; margin-right:10px; flex-shrink:0; }
        .counter { text-align:center; font-size:17px; margin:12px 0; color:#ffd700; font-weight:bold; }
        .match-card { background:rgba(0,0,0,0.4); border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); margin-bottom:8px; transition:border-color 0.2s; }
        .match-card:hover { border-color:rgba(255,215,0,0.35); }
        .match-header { background:rgba(255,215,0,0.12); padding:7px 14px; font-size:13px; color:#ffd700; font-weight:700; display:flex; justify-content:space-between; align-items:center; gap:8px; }
        .match-num-badge { background:rgba(255,215,0,0.25); color:#ffd700; border-radius:4px; padding:1px 7px; font-size:11px; font-weight:900; letter-spacing:1px; flex-shrink:0; }
        .match-team-row { display:flex; align-items:center; padding:11px 14px; cursor:pointer; transition:background 0.15s; border-left:3px solid transparent; }
        .match-team-row:hover { background:rgba(255,255,255,0.06); }
        .match-team-row.winner { background:rgba(0,212,138,0.12); border-left-color:#00d48a; }
        .match-team-row.loser { opacity:0.35; }
        .mflag { width:30px; height:20px; margin-right:9px; border-radius:2px; overflow:hidden; flex-shrink:0; object-fit:cover; }
        .slot-label { font-size:11px; color:rgba(255,255,255,0.4); margin-right:7px; white-space:nowrap; flex-shrink:0; min-width:52px; }
        .mname { flex:1; font-size:15px; font-weight:600; }
        .mcrown { color:#ffd700; font-size:15px; margin-left:5px; }
        .match-divider { height:1px; background:rgba(255,255,255,0.1); margin:0 10px; }
        .r32-wrapper { padding:14px; }
        .r32-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:9px; }
        .btn-row { text-align:center; padding:20px; background:rgba(0,0,0,0.3); display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
        button { background:linear-gradient(135deg,#c8102e,#8b0000); color:white; border:none; padding:12px 28px; border-radius:50px; font-size:16px; cursor:pointer; font-weight:700; transition:all 0.2s; }
        button:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(200,16,46,0.5); }
        button:disabled { background:linear-gradient(135deg,#444,#333); cursor:not-allowed; transform:none; box-shadow:none; opacity:0.6; }
        button.secondary { background:linear-gradient(135deg,#1a3a6e,#0d1f3c); }
        button.secondary:hover { box-shadow:0 6px 20px rgba(26,58,110,0.5); }
        .step-title { text-align:center; font-size:1.45em; color:#ffd700; margin:18px 0 14px; font-weight:700; }
        .step-desc { text-align:center; font-size:14px; color:#aaa; margin:-6px 0 14px; }
        .check-icon { color:#00d48a; font-size:18px; margin-left:auto; }
        /* Result canvas page */
        #resultWrap { padding:16px; }
        #resultCanvas { display:block; max-width:100%; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,0.6); margin:0 auto; }
        .result-actions { display:flex; justify-content:center; gap:12px; padding:16px 0 4px; flex-wrap:wrap; }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <div class="header-inner">
            <span class="header-trophy">🏆</span>
            <div class="header-titles">
                <span class="header-line1">玩转世界杯，</span>
                <span class="header-line2">决战到巅峰！</span>
            </div>
            <img class="header-bird" id="headerBird" src="logo.png" alt="bird">
        </div>
    </h1>
    <div class="progress">步骤 <span id="stepNum">1</span> / 7</div>
    <div id="steps"></div>
    <div class="btn-row" id="btnRow">
        <button class="secondary" onclick="prevStep()">← 上一步</button>

    </div>
</div>

// ==================== Helpers ====================
function getTeamByName(name) {
    for (const g of Object.keys(groupsData)) {
        const t = groupsData[g].find(t => t.name === name);
        if (t) return { ...t, group:g };
    }
    return null;
}
function getGroupTeam(g, rank) {
    const arr = selections.groups[g] || [];
    if (arr.length <= rank) return null;
    return getTeamByName(arr[rank]);
}
function buildThirdAssignment() {
    const key = [...selections.thirdPlaced].sort().join('');
    return THIRD_MAP[key] || {};
}
function resolveSlot(slot, ta) {
    if (slot.type==='W') return getGroupTeam(slot.g,0);
    if (slot.type==='R') return getGroupTeam(slot.g,1);
    if (slot.type==='T') { const tg=ta[slot.winner]; return tg?getGroupTeam(tg,2):null; }
    return null;
}
function getMatchWinner(matchNum) {
    const w = selections.r32Winners[matchNum] || selections.r16Winners[matchNum]
            || selections.qfWinners[matchNum] || selections.sfWinners[matchNum];
    return w ? (getTeamByName(w)||{name:w,flag:''}) : null;
}
function slotLabel(slot, ta) {
    if (slot.type==='W') return slot.g+'组第一';
    if (slot.type==='R') return slot.g+'组第二';
    if (slot.type==='T') { const tg=ta[slot.winner]; return tg?tg+'组第三':'待定'; }
    return '';
}
function flagImg(t) {
    if (!t||!t.flag) return '<span style="width:30px;display:inline-block"></span>';
    return `<img class="mflag" src="${t.flag}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`;
}

// ==================== STEP 1 ====================
function renderStep1() {
    const c = document.getElementById('steps');
    c.innerHTML = `<div class="step-title">第一步：为每个小组排出前三名</div>
        <div class="step-desc">点击球队依次选出第 1、2、3 名，第 4 名自动确定</div>
        <div class="groups-grid" id="groupsGrid"></div>`;
    const grid = document.getElementById('groupsGrid');
    Object.keys(groupsData).forEach(g => {
        const div = document.createElement('div');
        div.className = 'group';
        div.innerHTML = `<h3>📍 ${g}组</h3><div id="list-${g}"></div>`;
        grid.appendChild(div);
        const list = document.getElementById(`list-${g}`);
        groupsData[g].forEach((team,i) => {
            const el = document.createElement('div');
            el.className = 'team'; el.id = `team-${g}-${i}`;
            el.innerHTML = `<img class="team-flag" src="${team.flag}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
                <span class="team-name">${team.name}</span>
                <span class="position" id="pos-${g}-${team.name}"></span>`;
            el.onclick = () => toggleSelection(g, team.name);
            list.appendChild(el);
        });
        refreshGroup(g);
    });
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('nextBtn').textContent = '下一步 →';
}
function toggleSelection(group, teamName) {
    if (!selections.groups[group]) selections.groups[group] = [];
    const arr = selections.groups[group];
    const idx = arr.indexOf(teamName);
    if (idx > -1) arr.splice(idx,1);
    else if (arr.length < 3) arr.push(teamName);
    refreshGroup(group);
}
function refreshGroup(group) {
    const arr = selections.groups[group] || [];
    groupsData[group].forEach((team,i) => {
        const posEl = document.getElementById(`pos-${group}-${team.name}`);
        const teamEl = document.getElementById(`team-${group}-${i}`);
        if (!posEl||!teamEl) return;
        const pos = arr.indexOf(team.name);
        teamEl.classList.remove('selected-1','selected-2','selected-3');
        posEl.textContent = '';
        if (pos===0) { posEl.textContent='第1'; teamEl.classList.add('selected-1'); }
        else if (pos===1) { posEl.textContent='第2'; teamEl.classList.add('selected-2'); }
        else if (pos===2) { posEl.textContent='第3'; teamEl.classList.add('selected-3'); }
        else if (arr.length===3 && !arr.includes(team.name)) posEl.textContent='第4';
    });
}

        <div style="padding:0 16px 16px" id="thirds-list"></div>`;
    const list = document.getElementById('thirds-list');
    Object.keys(groupsData).forEach(g => {
        const arr = selections.groups[g]||[];
        const thirdName = arr[2]; if (!thirdName) return;
        const team = groupsData[g].find(t=>t.name===thirdName); if (!team) return;
        const div = document.createElement('div');
        div.className='third-item'; div.id=`third-${g}`;
        div.innerHTML = `<span class="grp-badge">${g}组</span>
            <img class="mflag" src="${team.flag}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
            <span style="font-size:15px;font-weight:600;flex:1;margin-left:8px">${team.name}</span>
            <span class="check-icon" id="chk-${g}" style="display:none">✓</span>`;
        div.onclick = () => toggleThird(g);
        list.appendChild(div);
    });
    updateThirdCounter();
}
function toggleThird(g) {
    const idx = selections.thirdPlaced.indexOf(g);
    if (idx>-1) selections.thirdPlaced.splice(idx,1);
    else { if (selections.thirdPlaced.length>=8) return; selections.thirdPlaced.push(g); }
    updateThirdCounter();
    Object.keys(groupsData).forEach(grp => {
        const el=document.getElementById(`third-${grp}`);
        const chk=document.getElementById(`chk-${grp}`);
        if (!el) return;
        const sel=selections.thirdPlaced.includes(grp);
        el.classList.toggle('sel',sel);
        if (chk) chk.style.display=sel?'inline':'none';
    });
}
function updateThirdCounter() {
    const cnt=selections.thirdPlaced.length;
    const el=document.getElementById('tcnt'); if (el) el.textContent=cnt;
    document.getElementById('nextBtn').disabled=cnt!==8;
}

    c.innerHTML = `<div class="step-title">第三步：32 强淘汰赛</div>
        <div class="step-desc">点击选出每场胜者 · 已预测 <span id="r32cnt">${decided}</span> / 16 场</div>
        <div class="r32-wrapper"><div class="r32-grid" id="r32grid"></div></div>`;
    const grid = document.getElementById('r32grid');
    R32_SCHEDULE.forEach(match => {
        const t1=resolveSlot(match.s1,ta), t2=resolveSlot(match.s2,ta);
        const w=selections.r32Winners[match.num];
        const t1w=w&&t1&&w===t1.name, t2w=w&&t2&&w===t2.name;
        const lbl1=slotLabel(match.s1,ta), lbl2=slotLabel(match.s2,ta);
        const card=document.createElement('div'); card.className='match-card';
        card.innerHTML=`<div class="match-header">
                <span class="match-num-badge">${match.num}</span>
                <span>${match.date} 北京时间${match.time}</span>
            </div>
            <div class="match-team-row ${t1w?'winner':(w?'loser':'')}" onclick="pickR32('${match.num}',0)">
                <span class="slot-label">${lbl1}</span>${flagImg(t1)}
                <span class="mname">${t1?t1.name:'待定'}</span>${t1w?'<span class="mcrown">👑</span>':''}
            </div><div class="match-divider"></div>
            <div class="match-team-row ${t2w?'winner':(w?'loser':'')}" onclick="pickR32('${match.num}',1)">
                <span class="slot-label">${lbl2}</span>${flagImg(t2)}
                <span class="mname">${t2?t2.name:'待定'}</span>${t2w?'<span class="mcrown">👑</span>':''}
            </div>`;
        grid.appendChild(card);
    });
    document.getElementById('nextBtn').disabled=decided<16;
}
function pickR32(num,ti) {
    const match=R32_SCHEDULE.find(m=>m.num===num); if (!match) return;
    const ta=buildThirdAssignment();
    const t=ti===0?resolveSlot(match.s1,ta):resolveSlot(match.s2,ta); if (!t) return;
    if (selections.r32Winners[num]===t.name) delete selections.r32Winners[num];
    else selections.r32Winners[num]=t.name;
    renderStep3();
}

// ==================== STEPS 4-7 (官方对阵) ====================
function pickKO(matchNum, side) {
    const allDefs=[...R16_DEF,...QF_DEF,...SF_DEF];
    const def=allDefs.find(d=>d.num===matchNum); if (!def) return;
    const t1=getMatchWinner(def.src1), t2=getMatchWinner(def.src2);
    if (!t1||!t2) return;
    const team=side==='t1'?t1:t2;
    const store=R16_DEF.find(d=>d.num===matchNum)?selections.r16Winners
               :QF_DEF.find(d=>d.num===matchNum)?selections.qfWinners
               :selections.sfWinners;
    if (store[matchNum]===team.name) delete store[matchNum];
    else store[matchNum]=team.name;
    renderCurrentStep();
}

function makeKOCard(def, store) {
    const t1=getMatchWinner(def.src1), t2=getMatchWinner(def.src2);
    const w=store[def.num];
    const t1w=w&&t1&&w===t1.name, t2w=w&&t2&&w===t2.name;
    const canPick=!!(t1&&t2);
    const card=document.createElement('div'); card.className='match-card';
    card.innerHTML=`<div class="match-header">
            <span class="match-num-badge">${def.num}</span>
            <span>${def.date} 北京时间${def.time}</span>
        </div>
        <div class="match-team-row ${t1w?'winner':(w?'loser':'')}" ${canPick?`onclick="pickKO('${def.num}','t1')"`:''} style="${!t1?'opacity:.4':''}">
            ${flagImg(t1)}<span class="mname" style="margin-left:${t1?'0':'30px'}">${t1?t1.name:'待定'}</span>
            ${t1w?'<span class="mcrown">👑</span>':''}
        </div><div class="match-divider"></div>
        <div class="match-team-row ${t2w?'winner':(w?'loser':'')}" ${canPick?`onclick="pickKO('${def.num}','t2')"`:''} style="${!t2?'opacity:.4':''}">
            ${flagImg(t2)}<span class="mname" style="margin-left:${t2?'0':'30px'}">${t2?t2.name:'待定'}</span>
            ${t2w?'<span class="mcrown">👑</span>':''}
        </div>`;
    return card;
}

function renderKORound(title, defs, store, total) {
    const done=Object.keys(store).length;
    const c=document.getElementById('steps');
    c.innerHTML=`<div class="step-title">${title}</div>
        <div class="step-desc">点击选出每场胜者 · 已预测 <span id="kodone">${done}</span> / ${total} 场</div>
        <div class="r32-wrapper"><div class="r32-grid" id="kogrid"></div></div>`;
    const grid=document.getElementById('kogrid');
    defs.forEach(def=>grid.appendChild(makeKOCard(def,store)));
    document.getElementById('nextBtn').disabled=done<total;
    document.getElementById('nextBtn').textContent='下一步 →';
}

function renderStep4() { renderKORound('第四步：16强淘汰赛',R16_DEF,selections.r16Winners,8); }
function renderStep5() { renderKORound('第五步：八强（1/4决赛）',QF_DEF,selections.qfWinners,4); }
function renderStep6() { renderKORound('第六步：四强（半决赛）',SF_DEF,selections.sfWinners,2); }

function renderStep7() {
    const t1=getMatchWinner(FINAL_DEF.src1), t2=getMatchWinner(FINAL_DEF.src2);
    const fw=selections.finalWinner;
    const t1w=fw&&t1&&fw===t1.name, t2w=fw&&t2&&fw===t2.name;
    const c=document.getElementById('steps');
    c.innerHTML=`<div class="step-title">第七步：决赛 🏆</div>
        <div class="step-desc">${FINAL_DEF.date} 北京时间${FINAL_DEF.time} · 选出你心目中的 2026 世界杯冠军！</div>
        <div class="r32-wrapper" style="max-width:460px;margin:0 auto">
            <div class="match-card" style="border:2px solid rgba(255,215,0,0.5)">
                <div class="match-header" style="background:rgba(255,215,0,0.2);justify-content:center;font-size:14px">🏆 2026 FIFA 世界杯 · 决赛 🏆</div>
                <div class="match-team-row ${t1w?'winner':(fw?'loser':'')}" onclick="pickFinal('t1')" style="padding:15px 18px">
                    ${flagImg(t1)}<span class="mname" style="font-size:17px;margin-left:${t1?'0':'30px'}">${t1?t1.name:'待定'}</span>
                    ${t1w?'<span class="mcrown" style="font-size:20px">👑</span>':''}
                </div>
                <div style="text-align:center;padding:3px;font-size:11px;color:#555;letter-spacing:4px">VS</div>
                <div class="match-team-row ${t2w?'winner':(fw?'loser':'')}" onclick="pickFinal('t2')" style="padding:15px 18px">
                    ${flagImg(t2)}<span class="mname" style="font-size:17px;margin-left:${t2?'0':'30px'}">${t2?t2.name:'待定'}</span>
                    ${t2w?'<span class="mcrown" style="font-size:20px">👑</span>':''}
                </div>
            </div>
            ${fw?`<div style="text-align:center;margin-top:18px;padding:14px;background:rgba(255,215,0,0.15);border-radius:12px;border:1px solid rgba(255,215,0,0.4)">
                <div style="font-size:12px;color:#aaa;margin-bottom:4px">我预测的冠军</div>
                <div style="font-size:22px;font-weight:900;color:#ffd700">${fw} 🏆</div></div>`:''}
        </div>`;
    window._finalT=[t1,t2];
    const nb=document.getElementById('nextBtn');
    nb.disabled=!fw;
    nb.textContent=fw?'生成预测图 🏆':'下一步 →';
    if (fw) nb.onclick=showResult; else nb.onclick=nextStep;
}
function pickFinal(side) {
    const [t1,t2]=window._finalT||[null,null]; if (!t1||!t2) return;
    const team=side==='t1'?t1:t2;
    if (selections.finalWinner===team.name) selections.finalWinner=null;
    else selections.finalWinner=team.name;
    renderStep7();
}

// ==================== Navigation ====================
function nextStep() {
    if (currentStep===1) {
        const inc=Object.keys(groupsData).filter(g=>(selections.groups[g]||[]).length<3);
        if (inc.length>0) { alert('请完成以下小组的排名：'+inc.join('、')+'组'); return; }
    }
    if (currentStep===2&&selections.thirdPlaced.length!==8) return;
    if (currentStep===3&&Object.keys(selections.r32Winners).length<16) return;
    if (currentStep===4&&Object.keys(selections.r16Winners).length<8) return;
    if (currentStep===5&&Object.keys(selections.qfWinners).length<4) return;
    if (currentStep===6&&Object.keys(selections.sfWinners).length<2) return;
    currentStep=Math.min(7,currentStep+1);
    document.getElementById('stepNum').textContent=currentStep;
    renderCurrentStep();
}
function prevStep() {
    if (currentStep<=1) return;
    currentStep--;
    document.getElementById('stepNum').textContent=currentStep;
    const nb=document.getElementById('nextBtn');
    nb.textContent='下一步 →'; nb.onclick=nextStep;
    renderCurrentStep();
}
function renderCurrentStep() {
    if (currentStep===1) renderStep1();
    else if (currentStep===2) renderStep2();
    else if (currentStep===3) renderStep3();
    else if (currentStep===4) renderStep4();
    else if (currentStep===5) renderStep5();
    else if (currentStep===6) renderStep6();
    else if (currentStep===7) renderStep7();
}

// ==================== 结果图（1920×1920 正方形）====================
function showResult() {
    document.getElementById('btnRow').style.display = 'none';
    const c = document.getElementById('steps');
    c.innerHTML = `
        <div id="resultWrap" style="padding:20px;">
            <div class="step-title" style="font-size:2.1em;margin-bottom:15px;">🏆 我的世界杯预测</div>
            <div style="text-align:center;">
                <canvas id="resultCanvas" width="1920" height="1920" 
                        style="max-width:100%;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.8);"></canvas>
            </div>
            <div class="result-actions" style="margin-top:20px;">
                <button onclick="downloadCanvas()">⬇ 保存图片</button>
                <button class="secondary" onclick="restartGame()">🔄 重新预测</button>
            </div>
        </div>`;
    setTimeout(drawNewBracket, 150);
}

async function drawNewBracket() {
    const canvas = document.getElementById('resultCanvas');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');

    const W = 1920;
    const H = 1920;

    function loadImage(src) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = src;
        });
    }

    const [logo, qr, cup] = await Promise.all([
        loadImage("logo.png"),
        loadImage("QR.png"),
        loadImage("cup.png")
    ]);

    // ====================
    // 背景
    // ====================
    const bg = ctx.createLinearGradient(0, 0, W, H);

    bg.addColorStop(0, "#081a34");
    bg.addColorStop(0.5, "#12345f");
    bg.addColorStop(1, "#1f4a78");

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // ====================
    // 顶部横幅
    // ====================
    ctx.fillStyle = "rgba(0,0,0,0.65)";
    ctx.fillRect(0, 0, W, 250);

    ctx.textAlign = "center";

    ctx.fillStyle = "#ffd700";
    ctx.font = "900 120px Microsoft YaHei";
    ctx.fillText("玩转世界杯", W / 2, 120);

    ctx.fillStyle = "#fff3b0";
    ctx.font = "900 110px Microsoft YaHei";
    ctx.fillText("决战到巅峰", W / 2, 225);

    ctx.drawImage(logo, W - 250, 30, 190, 190);

    // ====================
    // 淘汰赛树背景
    // ====================
    const treeTop = 290;
    const treeHeight = 720;

    ctx.fillStyle = "rgba(255,255,255,0.04)";
    ctx.fillRect(70, treeTop, W - 140, treeHeight);

    ctx.strokeStyle = "rgba(255,215,0,0.35)";
    ctx.lineWidth = 4;
    ctx.strokeRect(70, treeTop, W - 140, treeHeight);

    drawTournamentBracket(
        ctx,
        100,
        treeTop + 40,
        W - 200,
        treeHeight - 80
    );

    // ====================
    // 冠军展示区
    // ====================
    const champion = selections.finalWinner;

    if (champion) {

        const team = getTeamByName(champion);

        ctx.drawImage(cup, W/2 - 90, 560, 180, 220);

        if (team && team.flag) {

            try {

                const flagImg = await loadImage(team.flag);

                ctx.drawImage(
                    flagImg,
                    W/2 - 75,
                    800,
                    150,
                    100
                );

            } catch(e) {}

        }

        ctx.fillStyle = "#ffd700";
        ctx.font = "900 68px Microsoft YaHei";
        ctx.fillText(champion, W/2, 970);

        ctx.fillStyle = "#fff3b0";
        ctx.font = "900 38px Microsoft YaHei";
        ctx.fillText("世界杯冠军预测", W/2, 1030);
    }

    // ====================
    // 二维码区
    // ====================
    ctx.fillStyle = "#ffffff";
    ctx.font = "900 60px Microsoft YaHei";
    ctx.fillText("你也想预测？", W/2, 1130);

    ctx.font = "900 52px Microsoft YaHei";
    ctx.fillText("快扫二维码！", W/2, 1200);

    ctx.fillStyle = "#ffffff";

    ctx.fillRect(
        W/2 - 150,
        1250,
        300,
        300
    );

    ctx.drawImage(
        qr,
        W/2 - 130,
        1270,
        260,
        260
    );

    // ====================
    // 底部宣传区
    // ====================
    ctx.fillStyle = "#ffd700";

    ctx.font = "900 72px Microsoft YaHei";
    ctx.fillText(
        "截图发朋友圈/微信群",
        W/2,
        1670
    );

    ctx.fillText(
        "成绩最好者可获大奖！",
        W/2,
        1760
    );

    ctx.strokeStyle = "rgba(255,215,0,0.5)";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(300, 1820);
    ctx.lineTo(1620, 1820);
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.font = "34px Microsoft YaHei";

    ctx.fillText(
        "2026 FIFA World Cup Predictor",
        W/2,
        1880
    );
}

function downloadCanvas() {
    const canvas = document.getElementById('resultCanvas');
    if (!canvas) return;
    canvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.download = '我的世界杯预测.png';
        a.href = URL.createObjectURL(blob);
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }, 'image/png', 1.0);
}

function restartGame() {
    if (!confirm('确定重新预测吗？所有进度将清空。')) return;
    selections = {groups:{}, thirdPlaced:[], r32Winners:{}, r16Winners:{}, qfWinners:{}, sfWinners:{}, finalWinner:null};
    currentStep = 1;
    document.getElementById('stepNum').textContent = 1;
    document.getElementById('btnRow').style.display = '';
    renderStep1();
}

// Init
renderStep1();
</script>
</body>
</html>
